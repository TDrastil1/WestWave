<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WestWave - Home</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="main-page">
        <!-- Sidebar (Pools) -->
        <div class="sidebar">
            <h2>Pools</h2>
            <ul id="poolsList" class="pools-list">
                <li class="pool-item">General</li>
                <li class="pool-item">Gaming</li>
                <li class="pool-item">Music</li>
            </ul>
            <button id="addPoolButton">+ Add Pool</button>
        </div>

        <!-- Feed Section -->
        <div class="feed">
            <section class="stories">
                <h2>Stories</h2>
                <div class="stories-container">
                    <div class="story">A</div>
                    <div class="story">B</div>
                    <div class="story">C</div>
                </div>
            </section>
            <section class="posts">
                <h2>Feed</h2>
                <div class="post">
                    <h3>User 1</h3>
                    <p>Exploring WestWave!</p>
                </div>
                <div class="post">
                    <h3>User 2</h3>
                    <p>Welcome to my pool!</p>
                </div>
            </section>
        </div>

        <!-- Chat Section -->
        <div class="chat">
            <h2>Chat</h2>
            <div class="chat-container">
                <div class="chat-message"><strong>User1:</strong> Hi there!</div>
                <div class="chat-message"><strong>User2:</strong> Hello!</div>
            </div>
            <input type="text" placeholder="Type a message..." class="chat-input">
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
