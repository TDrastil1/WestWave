<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/styles.css">
    <title>WestWave | Home</title>
</head>
<body>
    <div class="navbar">
        <h1>WestWave</h1>
        <button id="logoutButton">Log Out</button>
    </div>
    <div class="content">
        <div class="sidebar">
            <h2>Pools</h2>
            <ul id="pools">
                <li data-pool="Gaming">Gaming</li>
                <li data-pool="Movies">Movies</li>
                <li data-pool="Study Group">Study Group</li>
            </ul>
        </div>
        <div class="main">
            <div id="stories">
                <h2>Stories</h2>
                <div id="storyList"></div>
                <textarea id="storyInput" placeholder="Add your story..."></textarea>
                <button id="addStory">Post Story</button>
            </div>
            <div id="feed">
                <h2>Feed</h2>
                <div id="postList"></div>
                <textarea id="postInput" placeholder="Share something..."></textarea>
                <button id="addPost">Post</button>
            </div>
        </div>
        <div class="chat">
            <h2>Chat</h2>
            <div id="chatMessages"></div>
            <input id="chatInput" placeholder="Type a message...">
            <button id="sendMessage">Send</button>
        </div>
    </div>
    <script src="js/home.js"></script>
    <script src="/socket.io/socket.io.js"></script>
</body>
</html>
