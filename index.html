<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WestWave - Login/Register</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="site-header">
        <h1>WestWave</h1>
        <p>Connect, Share, and Join Pools!</p>
    </header>

    <main>
        <!-- Authentication Section -->
        <section id="auth-section">
            <div class="auth-container">
                <form id="registerForm" class="form active-form">
                    <h2>Register</h2>
                    <input type="text" id="username" placeholder="Username" required>
                    <input type="email" id="email" placeholder="Email" required>
                    <input type="password" id="password" placeholder="Password" required>
                    <button type="submit">Register</button>
                    <p>
                        Already have an account? 
                        <button type="button" id="switchToLogin" class="inline-button">Log In</button>
                    </p>
                </form>

                <form id="loginForm" class="form">
                    <h2>Login</h2>
                    <input type="email" id="loginEmail" placeholder="Email" required>
                    <input type="password" id="loginPassword" placeholder="Password" required>
                    <button type="submit">Log In</button>
                    <p>
                        Don't have an account? 
                        <button type="button" id="switchToRegister" class="inline-button">Register</button>
                    </p>
                </form>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2024 WestWave. All rights reserved.</p>
    </footer>

    <script src="app.js"></script>
</body>
</html>
