<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - WestWave</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="register-page">
    <div class="register-container">
        <h1>Join WestWave</h1>
        <p>Your all-in-one social platform to connect, share, and explore.</p>

        <form id="registerForm">
            <label for="username">Username</label>
            <input type="text" id="username" placeholder="Enter your username" required>

            <label for="email">Email</label>
            <input type="email" id="email" placeholder="Enter your email" required>

            <label for="password">Password</label>
            <input type="password" id="password" placeholder="Enter a secure password" required>

            <button type="submit" class="btn">Register</button>
        </form>

        <div class="switch-auth">
            <p>Already have an account?</p>
            <button onclick="redirectToLogin()" class="btn-secondary">Log In</button>

            <link rel="stylesheet" href="styles.css">

        </div>
    </div>

    <script>
        function redirectToLogin() {
            window.location.href = "home.html";
        }

        // Handle form submission
        document.getElementById("registerForm").addEventListener("submit", function(event) {
            event.preventDefault();
            const username = document.getElementById("username").value;
            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;

            // Simulate registration process
            alert(`Thank you for registering, ${username}! Redirecting to the home page...`);
            window.location.href = "home.html"; // Redirect to home page
        });
    </script>
</body>
</html>
